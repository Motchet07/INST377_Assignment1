<html>

<head>

<title>Games</title>

<link rel="stylesheet" href="style.css">

<script>

function playGame(){

var choices = ["Rock","Paper","Scissors","Spock"];

var computer = choices[Math.floor(Math.random()*4)];

var user = document.getElementById("choice").value;

document.getElementById("userChoice").innerHTML = user;
document.getElementById("computerChoice").innerHTML = computer;


if(computer == "Spock"){
alert("You Lose");
document.body.style.backgroundColor = "red";
return;
}

if(user == computer){
alert("Tie");
document.body.style.backgroundColor = "blue";
}

else if(
(user=="Rock" && computer=="Scissors") ||
(user=="Paper" && computer=="Rock") ||
(user=="Scissors" && computer=="Paper")
){
alert("You Win");
document.body.style.backgroundColor = "green";
}

else{
alert("You Lose");
document.body.style.backgroundColor = "red";
}

}

</script>

</head>

<body>

<header>

<h1>Games Page</h1>

<nav>
<ul>

<li><a href="home.html">Home</a></li>
<li><a href="game.html">Games</a></li>
<li><a href="contact.html">Contact Us</a></li>

</ul>
</nav>

</header>


<h2>Rock Paper Scissors</h2>

<form onsubmit="playGame(); return false;">

<select id="choice">

<option value="Rock">Rock</option>
<option value="Paper">Paper</option>
<option value="Scissors">Scissors</option>

</select>

<input type="submit" value="Play">

</form>


<div class="gameBoxes">

<div class="box">

<h3>You Chose:</h3>
<p id="userChoice"></p>

</div>


<div class="box">

<h3>Computer Chose:</h3>
<p id="computerChoice"></p>

</div>

</div>


<footer>
<p>Website Footer</p>
</footer>

</body>

</html>
